*{box-sizing:border-box}body{color:#fff;background-color:#0000;background-image:linear-gradient(135deg,#04122af5,#085088e6,#f5c54233),url("data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"1200\" height=\"800\"><rect width=\"1200\" height=\"800\" fill=\"%23085088\"/><circle cx=\"950\" cy=\"130\" r=\"88\" fill=\"%23f5c542\"/><path d=\"M0 560 C220 500 360 625 570 565 C760 510 960 615 1200 535 L1200 800 L0 800 Z\" fill=\"%23f5c542\" opacity=\".8\"/><path d=\"M0 650 C250 590 420 690 650 630 C850 575 990 680 1200 610 L1200 800 L0 800 Z\" fill=\"%23ffffff\" opacity=\".35\"/><text x=\"60\" y=\"130\" font-size=\"66\" fill=\"white\" opacity=\".20\">RIO</text><text x=\"60\" y=\"190\" font-size=\"38\" fill=\"white\" opacity=\".16\">copa • praia • credit</text></svg>");background-position:0 0,0 0;background-repeat:repeat,repeat;background-size:cover;background-attachment:fixed;background-origin:padding-box,padding-box;background-clip:border-box,border-box;min-height:100vh;margin:0;font-family:Arial,Segoe UI,sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:22px}.hero{padding:24px 0}.tag{color:#ffe28a;text-transform:uppercase;letter-spacing:.08em;margin:0 0 8px;font-weight:900}h1{margin:0 0 8px;font-size:36px}h2{margin-top:0}.grid{grid-template-columns:1fr 1fr 1fr;gap:16px;display:grid}.card{-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);background:#ffffff24;border:1px solid #ffffff3d;border-radius:24px;padding:20px;box-shadow:0 20px 60px #0000004d}.wide{grid-column:span 3}label{margin:12px 0 6px;font-size:13px;font-weight:800;display:block}input,select{color:#fff;background:#00000057;border:1px solid #ffffff40;border-radius:14px;outline:none;width:100%;padding:13px}option{color:#111}button{color:#06172f;cursor:pointer;background:linear-gradient(135deg,#f5c542,#fff1a4);border:0;border-radius:16px;width:100%;margin-top:14px;padding:13px;font-weight:900}button:disabled{opacity:.55;cursor:not-allowed}.secondary{color:#fff;background:#ffffff26;border:1px solid #ffffff40}.danger{color:#fff;background:linear-gradient(135deg,#ef5350,#c62828)}.green{color:#06172f;background:linear-gradient(135deg,#13b66b,#7effb8)}.notice{background:#f5c54229;border:1px solid #f5c54261;border-radius:16px;margin:14px 0;padding:12px;line-height:1.4}.ok{background:#13b66b29;border-color:#13b66b70}.err{background:#ef53502e;border-color:#ef535070}.row{border-bottom:1px solid #ffffff24;justify-content:space-between;align-items:center;gap:12px;padding:12px;display:flex}.person{align-items:center;gap:12px;display:flex}.avatar{object-fit:cover;background:#10233d;border:2px solid #f5c542;border-radius:50%;width:44px;height:44px}.badge{color:#ffe28a;white-space:nowrap;background:#f5c5422e;border-radius:999px;padding:8px 12px;font-weight:900}.scorebox{align-items:center;gap:10px;display:flex}.scorebox span{font-size:28px;font-weight:900}.actions{flex-wrap:wrap;gap:8px;display:flex}.actions button{width:auto;margin:0;padding:9px 12px}.meter{background:#00000073;border:1px solid #ffffff2e;border-radius:999px;height:14px;margin-top:10px;overflow:hidden}.meter div{background:linear-gradient(90deg,#13b66b,#f5c542,#ef5350);height:100%;transition:all .2s}.risk{font-size:18px;font-weight:900}.low{color:#7effb8}.medium{color:#ffe28a}.high{color:#ff8f8f}.qr{background:#fff;border-radius:16px;width:220px;max-width:100%;padding:12px}.small{opacity:.82;word-break:break-word;font-size:13px}@media (width<=900px){.grid{grid-template-columns:1fr}.wide{grid-column:auto}.row{flex-direction:column;align-items:flex-start}.actions button{width:100%}}
